# ============================================================
#  MirrorMaker 2 Configuration
#  Primary → Standby replication
# ============================================================

# Cluster aliases used throughout this config
clusters = primary, standby

# Bootstrap servers for each cluster
primary.bootstrap.servers = primary-kafka:9092
standby.bootstrap.servers = standby-kafka:9092

# ------------------------------------------------------------------
# Replication rules
# Replicate commit-log from primary → standby
# The replicated topic on standby will be named primary.commit-log
# ------------------------------------------------------------------
primary->standby.enabled = true
primary->standby.topics = commit-log

# ------------------------------------------------------------------
# Consumer settings (source side: reading from primary)
# ------------------------------------------------------------------
primary->standby.consumer.group.id = mirrormaker2-consumer-group

# auto.offset.reset=earliest means: if no committed offset exists,
# start from the very beginning of the topic.
primary->standby.consumer.auto.offset.reset = earliest

# ------------------------------------------------------------------
# Offset sync: MirrorMaker 2 maintains an offset mapping so that
# if a failover happens, consumers on standby can resume from the
# correct position.
# ------------------------------------------------------------------
primary->standby.emit.checkpoints.enabled = true
primary->standby.emit.checkpoints.interval.seconds = 10
primary->standby.sync.group.offsets.enabled = true
primary->standby.sync.group.offsets.interval.seconds = 10

# ------------------------------------------------------------------
# Heartbeats: tells the standby cluster that MirrorMaker 2 is alive
# ------------------------------------------------------------------
primary->standby.emit.heartbeats.enabled = true
primary->standby.emit.heartbeats.interval.seconds = 5

# ------------------------------------------------------------------
# Replication factor for internal MirrorMaker 2 topics
# (set to 1 for single-node clusters)
# ------------------------------------------------------------------
checkpoints.topic.replication.factor = 1
heartbeats.topic.replication.factor = 1
offset-syncs.topic.replication.factor = 1
offset.storage.replication.factor = 1
status.storage.replication.factor = 1
config.storage.replication.factor = 1

# ------------------------------------------------------------------
# Connect worker settings
# ------------------------------------------------------------------
group.id = mirrormaker2-cluster

# Internal Connect topics stored on standby (the "target" side)
config.storage.topic = mirrormaker2-configs
offset.storage.topic = mirrormaker2-offsets
status.storage.topic = mirrormaker2-status

key.converter = org.apache.kafka.connect.converters.ByteArrayConverter
value.converter = org.apache.kafka.connect.converters.ByteArrayConverter

# Distributed mode REST interface (useful for monitoring)
rest.port = 8083
